name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile
        run: python -m compileall ars_universal tests tools

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Package smoke
        run: python -m pip install . --target tmp-install/pkg-test --no-deps --no-cache-dir

      - name: CLI list
        run: python -m ars_universal.cli --list

      - name: CLI diagnose
        run: |
          python -m ars_universal.cli codex install --target tmp-install/ci-codex
          python -m ars_universal.cli codex diagnose --target tmp-install/ci-codex

      - name: Stable platform smoke
        run: python tools/smoke_all_platforms.py --stable-only

      - name: Full platform smoke
        run: python tools/smoke_all_platforms.py --all
